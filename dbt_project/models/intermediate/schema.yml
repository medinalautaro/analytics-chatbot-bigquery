version: 2

models:
  - name: fct_orders
    description: Order-level fact table with one row per order.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: order_date
        tests:
          - not_null

      - name: total_amount
        tests:
          - not_null
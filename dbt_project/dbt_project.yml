name: 'analytics_chatbot'
version: '1.0.0'
config-version: 2

profile: 'analytics_chatbot'

model-paths: ["models"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
test-paths: ["tests"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  analytics_chatbot:
    staging:
      +materialized: view
    intermediate:
      +materialized: view

      max_dates:
        +materialized: table
    marts:
      +materialized: table
    chatbot:
      chatbot_revenue_monthly:
        +materialized: table

      chatbot_channel_performance_monthly:
        +materialized: table

      chatbot_orders_daily:
        +materialized: table

      chatbot_metric_catalog:
        +materialized: view

      chatbot_model_catalog:
        +materialized: view